name: Release

# Tag-driven (hatch-vcs): `git tag vX.Y.Z && git push origin vX.Y.Z`.
# Gated on the Tests suite (reusable workflow) — the release only runs after
# lint, type-check and pytest pass for the tagged commit.
# Builds the sdist/wheel and creates a GitHub Release. PyPI publishing is a
# separate workflow (pypi.yml) triggered when this Release is published, so a
# PyPI misconfiguration never blocks the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"

# No top-level permissions: grant least privilege per job instead.
jobs:
  # Run the full Tests suite against the tagged commit first; release depends
  # on it via `needs`, so a failing build never produces a Release.
  test:
    name: tests
    permissions:
      contents: read
    uses: ./.github/workflows/tests.yml

  release:
    name: build & github release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # hatch-vcs needs the full history + tags to derive the version.
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
          # Cache disabled in the release job: it runs with contents: write on
          # tag push, so a poisoned cache could taint a privileged build.
          enable-cache: false

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
